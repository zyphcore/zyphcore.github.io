<script>
    var typewriter = document.getElementById('typewriter');
    var text = "localhost ddoser";
    var delay = 340;
    var i = 0;
    var isDeleting = false;

    function type() {
        var currentText = text.substring(0, i);

        if (isDeleting) {
            typewriter.textContent = currentText.substring(0, currentText.length - 1);
        } else {
            typewriter.textContent = currentText;
        }

        if (!isDeleting && i === text.length) {
            isDeleting = true;
            delay = 400;
        } else if (isDeleting && i === 0) {
            isDeleting = false;
            delay = 400;
        }

        i += isDeleting ? -1 : 1;

        setTimeout(type, delay);
    }

    type();
</script>
