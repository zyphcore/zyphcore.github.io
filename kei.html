<head>

    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <meta content="#FF0000" data-react-helmet="true" name="theme-color">

<style>
    body {
    background-color: black;
    margin: 0;
    overflow: hidden;
    position: relative;
    align-items: -webkit-center;
    text-align: -webkit-center;
}

p {
    color: white;
    font-family: Manrope;
    font-size: 35px;
    font-weight: 700;
    margin-top: 450px;
    margin-left: 2px;
    cursor: pointer;
    transition: filter 0.25s ease-in-out;
    position: relative;
}

p:hover {
    filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.4));
    cursor: pointer;
    transition: filter 0.3s ease-in-out;
}

.user {
    color: white;
    filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.6));
    font-family: Manrope;
    font-size: 18px;
    cursor: pointer;
    pointer-events: none;
    font-weight: 700;
    margin-top: -140px;
    position: relative;
}

.description {
    color: white;
    filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.4));
    font-family: Manrope;
    font-size: 12px;
    cursor: pointer;
    pointer-events: none;
    font-weight: 700;
    margin-top: 10px;
    position: relative;
}

.overlay {
    background-color: black;
    width: 100vh;
    height: 100vh;
    transition: opacity 0.3s ease-in-out;
    align-items: -webkit-center;
    text-align: center;
    z-index: 1;
}

.avatar {
    width: 120px;
    height: 120px;
    margin-top: 200px;
    margin-left: 138px;
    border-radius: 50%;
    pointer-events: none;
    position: fixed;
}

.admin-badge {
    width: 20px;
    height: 20px;
    margin-top: 341px;
    margin-left: 172px;
    filter: drop-shadow(0 0 8px rgba(96, 100, 244, 0.89));
    pointer-events: none;
    position: fixed;
}

.dev-badge {
    width: 20px;
    height: 20px;
    margin-top: 342px;
    margin-left: 204px;
    filter: drop-shadow(0 0 8px rgba(48,172,100, 0.89));
    pointer-events: none;
    position: fixed;
}

.status {
    margin-top: 435px;
    pointer-events: none;
    position: relative;
}

.telegram {
    width: 28px;
    height: 28px;
    margin-left: -245px;
    margin-top: 530px;
    transition: transform 0.2s linear;
    position: fixed;
    cursor: default;
}

.discord {
    width: 29px;
    height: 23px;
    margin-left: -180px;
    margin-top: 533px;
    transition: transform 0.2s linear;
    position: fixed;
    cursor: default;
}

.telegram:hover {
    transform: scale(1.2);
    transition: transform 0.2s linear;
    cursor: default;
}

.discord:hover {
    transform: scale(1.2);
    transition: transform 0.2s linear;
    cursor: default;
}

.snowflake {
        font-size: 1.3em;
        color: white;
        text-shadow: 0 0 5px white;
        pointer-events: none;
        outline: none;
    }
